name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify release tag and source branch
        run: |
          TAG_REF="${GITHUB_REF#refs/tags/}"
          TAG="${TAG_REF#v}"
          if ! [[ "$TAG_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must be stable semver like v0.1.1." >&2
            exit 1
          fi

          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Refusing to publish: tag $TAG_REF is not on origin/main." >&2
            exit 1
          fi

          PKG_VERSION="$(node -p \"require('./package.json').version\")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG) does not match package.json version ($PKG_VERSION)." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify package
        run: npm run release:check

      - name: Publish to npm with trusted publishing
        id: publish_trusted
        continue-on-error: true
        run: |
          set -o pipefail
          npm publish --access public 2>&1 | tee npm-publish.log

      - name: Publish to npm with token fallback
        if: steps.publish_trusted.outcome == 'failure'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if ! grep -Eqi 'trusted publishing|authentication|E401|E403|not authorized|not authenticated' npm-publish.log; then
            echo "Trusted publish failed for a non-auth reason; not falling back to NPM_TOKEN." >&2
            cat npm-publish.log >&2
            exit 1
          fi

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Trusted publishing is not configured and NPM_TOKEN is missing." >&2
            echo "Configure npm trusted publishing for .github/workflows/release.yml or add the NPM_TOKEN repository secret." >&2
            exit 1
          fi

          npm publish --access public --provenance
